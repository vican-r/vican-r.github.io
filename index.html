<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radek Víčan</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background-color: #f8f8f8;
        }
        .container {
            background-color: #fff;
            border-radius: 8px;
            padding: 40px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            display: inline-block;
            text-align: left;
        }
        address {
            font-style: normal;
            line-height: 1.5;
        }
        .framed-image {
            display: block;
            margin-top: 20px;
            border: 3px solid #444;
            max-width: 100%;
            height: auto;
            object-fit: contain;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Radek Víčan</h1>
    <p><strong>IČO:</strong> 73505579</p>
    <p><strong>DIČ:</strong> CZ 8307081398</p>
    <address>
        Kačlehy 22<br>
        Jindřichův Hradec<br>
        377 01
    </address>
    <img src="vyvazecka.jpg" alt="Vyvážečka" class="framed-image">
</div>
</body>
</html>
